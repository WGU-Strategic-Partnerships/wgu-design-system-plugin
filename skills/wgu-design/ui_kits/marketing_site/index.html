<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>WGU Marketing — UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>body{margin:0;}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel">
  const { useState, useEffect } = React;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accentColor": "#97E152",
    "ctaColor": "#0070F0",
    "heroPattern": "swirl-blue.png",
    "heroHeadline": "Own the next chapter of your career.",
    "campaignMode": false,
    "headingScale": 1.0,
    "radius": 999,
    "showStatBand": true,
    "darkHero": true
  }/*EDITMODE-END*/;

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    const [modal, setModal] = useState(false);
    const apply = () => setModal(true);

    // Push tweak values into CSS vars so components pick them up without prop-drilling
    useEffect(() => {
      const r = document.documentElement;
      r.style.setProperty('--wgu-lime', t.accentColor);
      r.style.setProperty('--wgu-medium-blue', t.ctaColor);
      r.style.setProperty('--tweak-radius', t.radius + 'px');
      r.style.setProperty('--tweak-heading-scale', t.headingScale);
      r.style.setProperty('--tweak-hero-pattern', `url('../../assets/patterns/${t.heroPattern}')`);
    }, [t]);

    return (
      <>
        <Header onApply={apply}/>
        <Hero onApply={apply} headline={t.heroHeadline} campaign={t.campaignMode} dark={t.darkHero}/>
        {t.showStatBand && <StatBand/>}
        <ProgramGrid/>
        <Testimonial/>
        <CtaBand onApply={apply}/>
        <Footer/>

        <TweaksPanel>
          <TweakSection label="Brand accents" />
          <TweakColor  label="Accent (lime)"   value={t.accentColor} onChange={v=>setTweak('accentColor', v)} />
          <TweakColor  label="CTA (med. blue)" value={t.ctaColor}    onChange={v=>setTweak('ctaColor', v)} />

          <TweakSection label="Hero" />
          <TweakText   label="Headline" value={t.heroHeadline} onChange={v=>setTweak('heroHeadline', v)} />
          <TweakToggle label="Dark hero" value={t.darkHero} onChange={v=>setTweak('darkHero', v)} />
          <TweakToggle label="Campaign headline (Oswald)" value={t.campaignMode} onChange={v=>setTweak('campaignMode', v)} />
          <TweakSelect label="Hero pattern"  value={t.heroPattern}
            options={[
              {value:'swirl-blue.png',     label:'Swirl'},
              {value:'network-blue.png',   label:'Network'},
              {value:'connect-blue.png',   label:'Connect'},
              {value:'growth-blue.png',    label:'Growth'},
              {value:'pathways-blue.png',  label:'Pathways'},
              {value:'comms-navy-wide.png',label:'Comms (navy)'},
            ]}
            onChange={v=>setTweak('heroPattern', v)} />

          <TweakSection label="Type & shape" />
          <TweakSlider label="Heading scale" value={t.headingScale} min={0.8} max={1.4} step={0.05}
                       onChange={v=>setTweak('headingScale', v)} />
          <TweakSlider label="Button radius" value={t.radius} min={0} max={999} step={1} unit="px"
                       onChange={v=>setTweak('radius', v)} />

          <TweakSection label="Sections" />
          <TweakToggle label="Show stat band" value={t.showStatBand} onChange={v=>setTweak('showStatBand', v)} />
        </TweaksPanel>

        {modal && (
          <div onClick={()=>setModal(false)} style={{position:'fixed',inset:0,background:'rgba(0,23,49,0.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}}>
            <div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:16,padding:40,maxWidth:480,width:'90%',boxShadow:'0 12px 32px rgba(0,23,49,0.22)'}}>
              <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:11,letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--wgu-medium-blue)'}}>Start your application</div>
              <h2 style={{fontFamily:'var(--font-display)',fontWeight:800,fontSize:32,margin:'8px 0 10px',color:'var(--wgu-blue)'}}>Let's get you started.</h2>
              <p style={{fontFamily:'var(--font-body)',fontSize:16,color:'var(--fg-2)',margin:'0 0 20px',lineHeight:1.5}}>Applications take about 20 minutes. No application fee.</p>
              <button onClick={()=>{setModal(false);}} style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:15,background:'var(--wgu-medium-blue)',color:'#fff',border:0,padding:'14px 28px',borderRadius:'var(--tweak-radius, 999px)',cursor:'pointer',width:'100%'}}>Continue →</button>
              <button onClick={()=>setModal(false)} style={{marginTop:10,width:'100%',background:'transparent',border:0,fontFamily:'var(--font-display)',fontWeight:500,fontSize:14,color:'var(--fg-3)',cursor:'pointer',padding:10}}>Cancel</button>
            </div>
          </div>
        )}
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
