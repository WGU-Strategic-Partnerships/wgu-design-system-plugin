<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>WGU Slide — Title</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#000;overflow:hidden;}
  .slide{width:1280px;height:720px;position:relative;background:var(--wgu-blue);color:#fff;overflow:hidden;font-family:var(--font-display);}
  .bg{position:absolute;inset:0;background:url('../assets/patterns/swirl-blue.png') center/cover;opacity:0.55;}
  .overlay{position:absolute;inset:0;background:linear-gradient(135deg, rgba(0,23,49,0.85) 0%, rgba(0,40,85,0.5) 100%);}
  .content{position:absolute;inset:0;padding:80px 96px;display:flex;flex-direction:column;justify-content:space-between;}
  .top{display:flex;align-items:center;gap:18px;}
  .top img{height:56px;filter:brightness(0) invert(1);}
  .eyebrow{font-weight:700;font-size:16px;letter-spacing:0.2em;text-transform:uppercase;color:#97E152;}
  h1{font-weight:800;font-size:92px;line-height:0.96;letter-spacing:-0.01em;margin:14px 0 0;max-width:1040px;color:#fff;}
  .sub{font-weight:400;font-size:24px;line-height:1.35;color:#BBD0E8;margin-top:22px;max-width:800px;font-family:var(--font-body);}
  .footer{display:flex;justify-content:space-between;align-items:flex-end;font-family:var(--font-body);font-size:15px;color:#BBD0E8;}
  .footer .meta strong{color:#fff;font-weight:600;}
  .rule{width:96px;height:4px;background:#97E152;margin-top:28px;}
</style></head>
<body><div class="slide">
  <div class="bg"></div><div class="overlay"></div>
  <div class="content">
    <div>
      <div class="top"><img src="../assets/logos/wgu-owl-icon.png" alt="WGU"></div>
      <div class="rule"></div>
      <div class="eyebrow" style="margin-top:40px;">Q2 2026 · Board Update</div>
      <h1>Renewing<br>education's promise.</h1>
      <div class="sub">A snapshot of WGU's momentum across value, personalization, equity, partnership, and accountability.</div>
    </div>
    <div class="footer">
      <div class="meta">Presented by <strong>Academic Leadership</strong></div>
      <div class="meta">April 22, 2026 &nbsp;·&nbsp; Salt Lake City</div>
    </div>
  </div>
</div></body></html>
