<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>WGU Slide — Quote</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#000;overflow:hidden;}
  .slide{width:1280px;height:720px;position:relative;background:var(--wgu-midnight);color:#fff;overflow:hidden;font-family:var(--font-display);}
  .bg{position:absolute;inset:0;background:url('../assets/patterns/comms-navy-wide.png') center/cover;opacity:0.75;}
  .gradient{position:absolute;inset:0;background:linear-gradient(180deg, rgba(0,23,49,0.55) 0%, rgba(0,23,49,0.9) 100%);}
  .content{position:absolute;inset:0;padding:96px 96px 80px;display:flex;flex-direction:column;justify-content:center;}
  .mark{font-family:'Newsreader',serif;font-weight:600;font-size:220px;line-height:0.8;color:#97E152;letter-spacing:-0.02em;}
  blockquote{margin:0;font-weight:500;font-style:italic;font-size:42px;line-height:1.25;max-width:1020px;margin-top:-30px;text-wrap:balance;color:#fff;}
  .attr{font-family:var(--font-body);font-weight:400;font-size:18px;color:#BBD0E8;margin-top:36px;display:flex;align-items:center;gap:16px;}
  .dot{width:8px;height:8px;background:#97E152;border-radius:999px;}
  .owl{position:absolute;top:48px;right:64px;height:40px;filter:brightness(0) invert(1);opacity:0.85;}
</style></head>
<body><div class="slide">
  <div class="bg"></div><div class="gradient"></div>
  <img class="owl" src="../assets/logos/wgu-owl-icon.png" alt="WGU">
  <div class="content">
    <div class="mark">"</div>
    <blockquote>WGU gave me the flexibility to finish my degree while raising two kids and working full-time. It's the only way I could have done it.</blockquote>
    <div class="attr"><div class="dot"></div><span><strong style="color:#fff;font-weight:600;">Jamie R.</strong> &nbsp;·&nbsp; MBA '24, School of Business &nbsp;·&nbsp; Phoenix, AZ</span></div>
  </div>
</div></body></html>
