<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>WGU Slide — Closing / CTA</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#000;overflow:hidden;}
  .slide{width:1280px;height:720px;position:relative;background:url('../assets/backgrounds/midnight-gradient.png') center/cover, #001731;color:#fff;overflow:hidden;font-family:var(--font-display);}
  .pattern{position:absolute;left:0;bottom:0;right:0;height:320px;background:url('../assets/patterns/swirl-navy-wide.png') center/cover;opacity:0.5;mask-image:linear-gradient(0deg, #000 10%, transparent 100%);-webkit-mask-image:linear-gradient(0deg, #000 10%, transparent 100%);}
  .content{position:absolute;inset:0;padding:96px;display:flex;flex-direction:column;justify-content:space-between;}
  .eyebrow{font-weight:700;font-size:16px;letter-spacing:0.2em;text-transform:uppercase;color:#97E152;}
  h1{font-weight:800;font-size:108px;line-height:0.96;letter-spacing:-0.01em;margin:12px 0 0;max-width:1040px;color:#fff;}
  .rule{width:120px;height:5px;background:#97E152;margin:28px 0;}
  .sub{font-family:var(--font-body);font-size:22px;line-height:1.4;color:#BBD0E8;max-width:820px;}
  .bottom{display:flex;justify-content:space-between;align-items:flex-end;}
  .ctas{display:flex;gap:16px;}
  .btn{font-family:var(--font-display);font-weight:700;font-size:17px;padding:18px 36px;border-radius:999px;text-decoration:none;letter-spacing:0.02em;}
  .btn.primary{background:#97E152;color:#002855;}
  .btn.secondary{background:transparent;border:2px solid #fff;color:#fff;padding:16px 34px;}
  .owl{height:48px;filter:brightness(0) invert(1);}
</style></head>
<body><div class="slide">
  <div class="pattern"></div>
  <div class="content">
    <div>
      <div class="eyebrow">Own your future</div>
      <h1>Let's build<br>what's next.</h1>
      <div class="rule"></div>
      <div class="sub">Explore degrees, talk with an enrollment counselor, or start your application today.</div>
    </div>
    <div class="bottom">
      <img class="owl" src="../assets/logos/wgu-owl-icon.png" alt="WGU">
      <div class="ctas">
        <a class="btn secondary" href="#">Request info</a>
        <a class="btn primary" href="#">Apply now →</a>
      </div>
    </div>
  </div>
</div></body></html>
