<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="background:#FAFBFC;">
  <div class="label" style="margin-bottom:18px;">Elevation — blue-tinted, never black</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:22px;padding:10px 4px 18px;">
    <div style="text-align:center;"><div style="height:70px;background:#fff;border-radius:8px;box-shadow:0 1px 2px rgba(0,23,49,0.08);"></div><div class="meta" style="margin-top:10px;"><strong>sm</strong><br>0 1px 2px / 8%</div></div>
    <div style="text-align:center;"><div style="height:70px;background:#fff;border-radius:8px;box-shadow:0 4px 12px rgba(0,23,49,0.10);"></div><div class="meta" style="margin-top:10px;"><strong>md</strong><br>0 4px 12px / 10%</div></div>
    <div style="text-align:center;"><div style="height:70px;background:#fff;border-radius:8px;box-shadow:0 12px 32px rgba(0,23,49,0.14);"></div><div class="meta" style="margin-top:10px;"><strong>lg</strong><br>0 12px 32px / 14%</div></div>
  </div>
  <div class="meta" style="margin-top:2px;">Shadows use Midnight `#001731` as their tint so the lift reads on-brand. Pure-black shadows are not used.</div>
</div></body></html>
