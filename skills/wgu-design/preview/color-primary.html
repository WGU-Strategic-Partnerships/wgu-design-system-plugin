<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="grid" style="grid-template-columns: repeat(2, 1fr); gap: 14px;">
    <div>
      <div class="swatch" style="height: 96px; background: #001731;"></div>
      <div style="margin-top:8px"><div style="font-family:var(--font-display);font-weight:700;font-size:14px;">Midnight</div><div class="meta"><strong>#001731</strong> · RGB 0,23,49</div></div>
    </div>
    <div>
      <div class="swatch" style="height: 96px; background: #002855; outline: 2px solid #97E152; outline-offset: -2px;"></div>
      <div style="margin-top:8px"><div style="font-family:var(--font-display);font-weight:700;font-size:14px;">WGU Blue <span style="background:#97E152;color:#002855;padding:1px 6px;border-radius:3px;font-size:10px;margin-left:4px;">CORE</span></div><div class="meta"><strong>#002855</strong> · RGB 0,40,85 · Pantone 534C</div></div>
    </div>
  </div>
  <div class="meta" style="margin-top:14px;line-height:1.5;">WGU Blue is the priority, core color — it must appear on every designed asset. Midnight is its deeper pair, used for footers, gradients, and heavy dark surfaces.</div>
</div></body></html>
