<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div style="display:grid;grid-template-columns:auto auto 1fr;gap:28px;align-items:center;">
    <img src="../assets/logos/wgu-logo-university.png" alt="University Logo" style="height:72px;">
    <img src="../assets/logos/wgu-owl-icon.png" alt="Owl Icon" style="height:72px;">
    <div>
      <div style="font-family:var(--font-display);font-weight:700;font-size:14px;color:#002855;">University Logo · Owl Icon · Wordmark</div>
      <div class="meta" style="margin-top:6px;line-height:1.5;">Owl + wordmark = default. Owl alone only for students/alumni/employees. Wordmark alone never uses the icon. Min size: 52px web, 0.725in print.</div>
    </div>
  </div>
  <div style="margin-top:12px;background:#EEF6F9;padding:10px 14px;border-radius:6px;display:flex;gap:14px;align-items:center;">
    <img src="../assets/logos/wgu-wordmark.png" alt="Wordmark" style="height:34px;">
    <span class="meta">Wordmark — always used without the icon.</span>
  </div>
</div></body></html>
