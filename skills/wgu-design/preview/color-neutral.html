<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="grid" style="grid-template-columns: repeat(4, 1fr); gap: 12px;">
    <div>
      <div class="swatch" style="height: 76px; background: #EEF6F9;"></div>
      <div style="margin-top:6px"><div style="font-family:var(--font-display);font-weight:700;font-size:12px;">Light Blue</div><div class="meta"><strong>#EEF6F9</strong></div></div>
    </div>
    <div>
      <div class="swatch" style="height: 76px; background: #F1F1F1;"></div>
      <div style="margin-top:6px"><div style="font-family:var(--font-display);font-weight:700;font-size:12px;">Light Grey</div><div class="meta"><strong>#F1F1F1</strong></div></div>
    </div>
    <div>
      <div class="swatch" style="height: 76px; background: #A7A7A7;"></div>
      <div style="margin-top:6px"><div style="font-family:var(--font-display);font-weight:700;font-size:12px;">Grey</div><div class="meta"><strong>#A7A7A7</strong></div></div>
    </div>
    <div>
      <div class="swatch" style="height: 76px; background: #FFFFFF; border-color: rgba(0,40,85,0.16);"></div>
      <div style="margin-top:6px"><div style="font-family:var(--font-display);font-weight:700;font-size:12px;">White</div><div class="meta"><strong>#FFFFFF</strong></div></div>
    </div>
  </div>
  <div class="meta" style="margin-top:14px;line-height:1.5;">Neutral surfaces and muted text. Light Blue = tinted sections; Light Grey = cards/chips; Grey = muted text, dividers.</div>
</div></body></html>
