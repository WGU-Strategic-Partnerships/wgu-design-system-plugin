    <div style="text-align:center;"><div style="background:#002855;width:8px;height:8px;margin:0 auto;"></div><div class="meta" style="margin-top:6px;"><strong>2</strong><br>8</div></div>

    <div style="text-align:center;"><div style="background:#002855;width:96px;height:96px;margin:0 auto;"></div><div class="meta" style="margin-top:6px;"><strong>9</strong><br>96</div></div>
  </div>
</div></body></html>
