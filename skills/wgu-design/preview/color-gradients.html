<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 16px;">
    <div>
      <div class="swatch" style="height: 130px; background: linear-gradient(180deg, #001731 0%, #002855 100%); display:flex;align-items:flex-end;justify-content:flex-start;padding:12px;color:#fff;font-family:var(--font-display);font-weight:500;font-size:13px;">Midnight Gradient</div>
      <div class="meta" style="margin-top:8px;"><strong>#001731 → #002855</strong><br>Footers, dark full-bleed sections. Web only.</div>
    </div>
    <div>
      <div class="swatch" style="height: 130px; background: linear-gradient(135deg, #002855 0%, #0070F0 100%); display:flex;align-items:flex-end;justify-content:flex-start;padding:12px;color:#fff;font-family:var(--font-display);font-weight:500;font-size:13px;">Medium Blue Gradient</div>
      <div class="meta" style="margin-top:8px;"><strong>#002855 → #0070F0</strong><br>CTA banners, Apply Now, quote blocks. Web only.</div>
    </div>
  </div>
</div></body></html>
