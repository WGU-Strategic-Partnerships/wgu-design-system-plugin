<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label" style="margin-bottom:14px;">Form field — rest, focus, filled, error</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
    <label style="display:block;"><span style="display:block;font-family:var(--font-display);font-weight:500;font-size:13px;margin-bottom:6px;color:#002855;">Email</span><input style="width:100%;font-family:var(--font-body);font-size:15px;padding:12px 14px;border:1px solid rgba(0,40,85,0.24);border-radius:8px;background:#fff;" placeholder="you@example.com"></label>
    <label style="display:block;"><span style="display:block;font-family:var(--font-display);font-weight:500;font-size:13px;margin-bottom:6px;color:#002855;">Program of interest</span><input value="MBA — Business Admin" style="width:100%;font-family:var(--font-body);font-size:15px;padding:12px 14px;border:2px solid #0070F0;border-radius:8px;background:#fff;box-shadow:0 0 0 3px rgba(0,112,240,0.25);"></label>
    <label style="display:block;"><span style="display:block;font-family:var(--font-display);font-weight:500;font-size:13px;margin-bottom:6px;color:#002855;">State</span><input value="Utah" style="width:100%;font-family:var(--font-body);font-size:15px;padding:12px 14px;border:1px solid rgba(0,40,85,0.24);border-radius:8px;background:#fff;"></label>
    <label style="display:block;"><span style="display:block;font-family:var(--font-display);font-weight:500;font-size:13px;margin-bottom:6px;color:#B30020;">Phone</span><input value="555" style="width:100%;font-family:var(--font-body);font-size:15px;padding:12px 14px;border:2px solid #B30020;border-radius:8px;background:#fff;"><span style="font-family:var(--font-body);font-size:12px;color:#B30020;margin-top:4px;display:block;">Please enter a 10-digit phone number.</span></label>
  </div>
</div></body></html>
