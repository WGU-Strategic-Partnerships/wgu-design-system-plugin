<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label" style="margin-bottom:14px;">Buttons — Primary, Secondary, Tertiary</div>
  <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap;">
    <button style="font-family:var(--font-display);font-weight:700;font-size:15px;background:#0070F0;color:#fff;border:0;padding:14px 28px;border-radius:999px;cursor:pointer;letter-spacing:0.02em;">Apply Now</button>
    <button style="font-family:var(--font-display);font-weight:700;font-size:15px;background:#fff;color:#002855;border:2px solid #002855;padding:12px 26px;border-radius:999px;cursor:pointer;letter-spacing:0.02em;">Request Info</button>
    <button style="font-family:var(--font-display);font-weight:600;font-size:15px;background:transparent;color:#0070F0;border:0;padding:14px 8px;cursor:pointer;text-decoration:underline;text-underline-offset:3px;">Learn more →</button>
  </div>
  <div class="meta" style="margin-top:14px;">Pill radius (999px). Primary = Medium Blue fill. Secondary = WGU Blue outline on white. Tertiary = text link in Medium Blue.</div>
</div></body></html>
