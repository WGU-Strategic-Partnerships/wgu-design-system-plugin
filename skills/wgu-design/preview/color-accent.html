<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="grid" style="grid-template-columns: repeat(3, 1fr); gap: 14px;">
    <div>
      <div class="swatch" style="height: 84px; background: #0070F0;"></div>
      <div style="margin-top:8px"><div style="font-family:var(--font-display);font-weight:700;font-size:13px;">Medium Blue</div><div class="meta"><strong>#0070F0</strong></div></div>

    <div>
      <div class="swatch" style="height: 84px; background: #46B1EF;"></div>

    </div>
    <div>
      <div class="swatch" style="height: 84px; background: #97E152;"></div>
      <div style="margin-top:8px"><div style="font-family:var(--font-display);font-weight:700;font-size:13px;">Lime Green</div><div class="meta"><strong>#97E152</strong></div></div>
    </div>
  </div>
  <div class="meta" style="margin-top:14px;line-height:1.5;">Accent colors used alongside WGU Blue for illustrations, icons, data viz, and graphic elements. Medium Blue = CTAs/links · Sky Blue = illustrations · Lime Green = sparingly, a single highlight pop.</div>
